<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">pokefuta detail page UI icons</title>
  <desc id="desc">Reusable SVG symbols for Pokefuta detail page cards and section headings.</desc>
  <defs>
    <style>
      .bg{fill:#FFF8EC}.card{fill:#fffdf7;stroke:#E8DCC8;stroke-width:2}.purple{fill:#6F55A3}.purple2{fill:#8A66C2}.cream{fill:#FFF3D6}.brown{fill:#6A4B36}.sky{fill:#89CFF0}.green{fill:#2D8F46}.orange{fill:#F0A44A}.red{fill:#E73A51}.dark{fill:#2B2B2B}.muted{fill:#BFAF98}.stroke-purple{stroke:#6F55A3}.stroke-brown{stroke:#6A4B36}.stroke-dark{stroke:#2B2B2B}.stroke-green{stroke:#2D8F46}.stroke-orange{stroke:#F0A44A}.stroke-sky{stroke:#89CFF0}.stroke-red{stroke:#E73A51}.line{fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:7}.line-sm{fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:5}.label{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;font-size:18px;font-weight:700;fill:#2B2B2B}.small{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px;fill:#6A4B36}.symbol-box{fill:#fffdf7;stroke:#eadfca;stroke-width:2;rx:20}.soft-shadow{filter:url(#shadow)}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#4A341F" flood-opacity="0.13"/>
    </filter>

    <!-- Generic / detail page symbols. Use as <svg><use href="#icon-detail-location"/></svg> -->
    <symbol id="icon-detail-location" viewBox="0 0 96 96">
      <path class="cream" d="M17 24h48l14 14v34H17z"/>
      <path class="line stroke-brown" d="M17 24h48l14 14v34H17zM65 24v14h14"/>
      <path class="purple" d="M48 68s17-17 17-32a17 17 0 1 0-34 0c0 15 17 32 17 32z"/>
      <circle cx="48" cy="36" r="7" fill="#fff"/>
    </symbol>

    <symbol id="icon-detail-pokemon" viewBox="0 0 96 96">
      <rect x="18" y="12" width="60" height="72" rx="12" class="cream"/>
      <rect x="18" y="12" width="60" height="72" rx="12" class="line stroke-brown"/>
      <circle cx="48" cy="39" r="18" class="purple" opacity="0.15"/>
      <path class="line-sm stroke-purple" d="M35 46c4 6 9 9 13 9s9-3 13-9M36 35c4-4 8-6 12-6s8 2 12 6"/>
      <circle cx="40" cy="39" r="3" class="purple"/>
      <circle cx="56" cy="39" r="3" class="purple"/>
      <path class="line-sm stroke-brown" d="M31 67h34"/>
    </symbol>

    <symbol id="icon-detail-nearby" viewBox="0 0 96 96">
      <circle cx="48" cy="48" r="31" fill="#F8F1E2"/>
      <path class="line-sm stroke-purple" d="M48 14v10M48 72v10M14 48h10M72 48h10"/>
      <path class="purple" d="M48 68s18-18 18-34a18 18 0 1 0-36 0c0 16 18 34 18 34z"/>
      <circle cx="48" cy="34" r="7" fill="#fff"/>
      <path class="orange" d="M23 65s6-8 14-6 12 10 22 7 14-11 14-11" fill="none" stroke="#F0A44A" stroke-width="5" stroke-linecap="round"/>
    </symbol>

    <symbol id="icon-detail-same-pref" viewBox="0 0 96 96">
      <rect x="13" y="17" width="70" height="58" rx="12" class="cream"/>
      <rect x="13" y="17" width="70" height="58" rx="12" class="line stroke-brown"/>
      <path class="muted" opacity="0.45" d="M25 62l8-23 14 8 11-16 12 31z"/>
      <path class="purple" d="M63 54s11-11 11-21a11 11 0 1 0-22 0c0 10 11 21 11 21z"/>
      <circle cx="63" cy="33" r="4" fill="#fff"/>
      <path class="line-sm stroke-purple" d="M28 30h15M28 43h12M28 56h20"/>
    </symbol>

    <symbol id="icon-detail-same-city" viewBox="0 0 96 96">
      <path class="cream" d="M17 73V39l18-13 18 13v34z"/>
      <path class="line stroke-brown" d="M17 73V39l18-13 18 13v34M53 73V46h26v27"/>
      <path class="line-sm stroke-purple" d="M29 73V57h12v16M62 57h8M62 67h8"/>
      <path class="purple" d="M72 44s12-12 12-23a12 12 0 1 0-24 0c0 11 12 23 12 23z"/>
      <circle cx="72" cy="21" r="4" fill="#fff"/>
    </symbol>

    <symbol id="icon-link-map" viewBox="0 0 96 96">
      <path class="line stroke-purple" d="M13 24l22-9 26 9 22-9v57l-22 9-26-9-22 9zM35 15v57M61 24v57"/>
      <circle cx="61" cy="43" r="8" class="orange"/>
    </symbol>

    <symbol id="icon-link-google-map" viewBox="0 0 96 96">
      <rect x="12" y="16" width="72" height="64" rx="14" class="cream"/>
      <path class="line stroke-brown" d="M12 16h72v64H12z"/>
      <path class="line-sm stroke-sky" d="M22 63c13-18 28-18 52-41"/>
      <path class="line-sm stroke-green" d="M20 36h56"/>
      <path class="purple" d="M50 70s18-20 18-36a18 18 0 1 0-36 0c0 16 18 36 18 36z"/>
      <circle cx="50" cy="34" r="7" fill="#fff"/>
    </symbol>

    <symbol id="icon-link-official" viewBox="0 0 96 96">
      <path class="line stroke-green" d="M33 19h44v44M75 21L38 58"/>
      <rect x="18" y="34" width="44" height="43" rx="8" class="line stroke-brown"/>
      <path class="orange" d="M25 25l10 9 12-16 8 17 16-7-7 16 17 8-19 6-2 19-14-13-17 10 3-19-16-9 18-4z" opacity="0.35"/>
    </symbol>

    <symbol id="icon-link-prefecture" viewBox="0 0 96 96">
      <rect x="15" y="17" width="66" height="62" rx="12" class="cream"/>
      <path class="line stroke-purple" d="M15 17h66v62H15z"/>
      <path class="muted" opacity="0.5" d="M28 62l10-30 16 11 13-19 11 38z"/>
      <circle cx="68" cy="31" r="8" class="green"/>
      <path class="line-sm stroke-brown" d="M26 68h42"/>
    </symbol>

    <symbol id="icon-link-photo" viewBox="0 0 96 96">
      <rect x="15" y="28" width="66" height="48" rx="12" class="cream"/>
      <path class="line stroke-brown" d="M15 28h66v48H15zM35 28l6-10h14l6 10"/>
      <circle cx="48" cy="52" r="14" fill="#fff" stroke="#6F55A3" stroke-width="7"/>
      <circle cx="70" cy="39" r="4" class="purple"/>
    </symbol>

    <symbol id="icon-link-share" viewBox="0 0 96 96">
      <circle cx="28" cy="48" r="12" class="red"/>
      <circle cx="68" cy="24" r="12" class="red"/>
      <circle cx="68" cy="72" r="12" class="red"/>
      <path class="line-sm stroke-red" d="M38 42l20-12M38 54l20 12"/>
    </symbol>

    <symbol id="icon-section-card" viewBox="0 0 96 96">
      <rect x="14" y="18" width="68" height="60" rx="14" class="cream"/>
      <rect x="14" y="18" width="68" height="60" rx="14" class="line stroke-brown"/>
      <path class="line-sm stroke-purple" d="M28 34h40M28 48h32M28 62h24"/>
    </symbol>
  </defs>

  <rect width="960" height="720" class="bg"/>
  <text x="48" y="52" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="30" font-weight="800" fill="#2B2B2B">pokefuta 詳細ページ UI アイコンセット</text>
  <text x="48" y="82" class="small" font-size="15">design/pokefuta_ui_icons.svg へ追加しやすい symbol 形式。生成ページでは use href="#icon-..." で利用。</text>

  <g transform="translate(48,125)">
    <g class="soft-shadow"><rect class="symbol-box" width="160" height="130" rx="20"/><svg x="48" y="18" width="64" height="64"><use href="#icon-detail-location"/></svg><text x="80" y="105" text-anchor="middle" class="label">設置場所</text></g>
    <g transform="translate(180,0)" class="soft-shadow"><rect class="symbol-box" width="160" height="130" rx="20"/><svg x="48" y="18" width="64" height="64"><use href="#icon-detail-pokemon"/></svg><text x="80" y="105" text-anchor="middle" class="label">登場ポケモン</text></g>
    <g transform="translate(360,0)" class="soft-shadow"><rect class="symbol-box" width="160" height="130" rx="20"/><svg x="48" y="18" width="64" height="64"><use href="#icon-detail-nearby"/></svg><text x="80" y="105" text-anchor="middle" class="label">30km以内</text></g>
    <g transform="translate(540,0)" class="soft-shadow"><rect class="symbol-box" width="160" height="130" rx="20"/><svg x="48" y="18" width="64" height="64"><use href="#icon-detail-same-pref"/></svg><text x="80" y="105" text-anchor="middle" class="label">同じ県</text></g>
    <g transform="translate(720,0)" class="soft-shadow"><rect class="symbol-box" width="160" height="130" rx="20"/><svg x="48" y="18" width="64" height="64"><use href="#icon-detail-same-city"/></svg><text x="80" y="105" text-anchor="middle" class="label">同じ市町村</text></g>
  </g>

  <g transform="translate(48,305)">
    <g class="soft-shadow"><rect class="symbol-box" width="160" height="130" rx="20"/><svg x="48" y="18" width="64" height="64"><use href="#icon-link-google-map"/></svg><text x="80" y="105" text-anchor="middle" class="label">Google Maps</text></g>
    <g transform="translate(180,0)" class="soft-shadow"><rect class="symbol-box" width="160" height="130" rx="20"/><svg x="48" y="18" width="64" height="64"><use href="#icon-link-official"/></svg><text x="80" y="105" text-anchor="middle" class="label">公式サイト</text></g>
    <g transform="translate(360,0)" class="soft-shadow"><rect class="symbol-box" width="160" height="130" rx="20"/><svg x="48" y="18" width="64" height="64"><use href="#icon-link-prefecture"/></svg><text x="80" y="105" text-anchor="middle" class="label">県公式</text></g>
    <g transform="translate(540,0)" class="soft-shadow"><rect class="symbol-box" width="160" height="130" rx="20"/><svg x="48" y="18" width="64" height="64"><use href="#icon-link-map"/></svg><text x="80" y="105" text-anchor="middle" class="label">全国マップ</text></g>
    <g transform="translate(720,0)" class="soft-shadow"><rect class="symbol-box" width="160" height="130" rx="20"/><svg x="48" y="18" width="64" height="64"><use href="#icon-link-photo"/></svg><text x="80" y="105" text-anchor="middle" class="label">写真投稿</text></g>
  </g>

  <g transform="translate(48,500)">
    <rect width="864" height="140" rx="24" fill="#fffdf7" stroke="#E8DCC8" stroke-width="2" class="soft-shadow"/>
    <text x="28" y="40" class="label">Claude Code への組み込みメモ</text>
    <text x="28" y="72" class="small" font-size="15">・このSVGの defs/symbol 部分を design/pokefuta_ui_icons.svg に移植。</text>
    <text x="28" y="98" class="small" font-size="15">・詳細ページでは section heading / link-card / related-card に対応する icon を use で呼び出す。</text>
    <text x="28" y="124" class="small" font-size="15">・公式キャラ風・モンスターボール風を避け、旅アプリ/スタンプ帳の抽象アイコンに統一。</text>
  </g>
</svg>
