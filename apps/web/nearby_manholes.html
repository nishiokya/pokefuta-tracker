<body>
  <div class="container">
    <header class="page-header nb-surface">
      <div class="page-header__top">
        <div>
          <h1>近くのポケふた検索</h1>
          <p>現在地から近いポケモンマンホールを距離順に表示します。</p>
        </div>
        <nav class="page-nav" aria-label="サイト内リンク">
          <a class="link-pill alt" href="./">ポケふたマップ</a>
          <a class="link-pill" href="./gmanhole_map.html">統合マップ</a>
        </nav>
      </div>
    </header>

    <div class="tool-panel" aria-label="近くのポケふた検索条件">
      <div class="location-status" id="locationStatus">
        <button class="location-button" onclick="getCurrentLocation()">現在地を取得</button>
      </div>

      <div class="distance-filter" id="distanceFilter" hidden>
        <label for="distanceSelect">表示範囲</label>
        <select id="distanceSelect" onchange="filterManholes()">
          <option value="1">1km以内</option>
          <option value="3">3km以内</option>
          <option value="5">5km以内</option>
          <option value="10">10km以内</option>
          <option value="20">20km以内</option>
          <option value="50">50km以内</option>
          <option value="999999" selected>すべて</option>
        </select>
      </div>
    </div>

    <div class="manhole-list" id="manholeList">
      <div class="loading">位置情報を取得してマンホールを表示します</div>
    </div>
  </div>

  <script>
    let allManholes = [];
    let userLocation = null;

    // Calculate distance between two coordinates in kilometers
    function calculateDistance(lat1, lng1, lat2, lng2) {
      const R = 6371; // Earth's radius in kilometers
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng/2) * Math.sin(dLng/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // Format distance for display
    function formatDistance(distance) {
      if (distance < 1) {
        return Math.round(distance * 1000) + 'm';
      } else {
        return distance.toFixed(1) + 'km';
      }
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }

    // Get current location
    function getCurrentLocation() {
      const statusDiv = document.getElementById('locationStatus');
      statusDiv.innerHTML = '<div class="status-muted">位置情報を取得中...</div>';

      if (!navigator.geolocation) {
        statusDiv.innerHTML = '<div class="error">このブラウザは位置情報に対応していません</div>';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          userLocation = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
          statusDiv.innerHTML = '<div class="status-success">位置情報を取得しました</div>';
          document.getElementById('distanceFilter').hidden = false;
          loadManholes();
        },
        function(error) {
          let errorMessage = '位置情報の取得に失敗しました';
          switch(error.code) {
            case error.PERMISSION_DENIED:
              errorMessage = '位置情報へのアクセスが拒否されました';
              break;
            case error.POSITION_UNAVAILABLE:
              errorMessage = '位置情報が利用できません';
              break;
            case error.TIMEOUT:
              errorMessage = '位置情報の取得がタイムアウトしました';
              break;
          }
          statusDiv.innerHTML = `<div class="error">${errorMessage}</div><button class="location-button" onclick="getCurrentLocation()" style="margin-top: 10px;">再試行</button>`;
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 300000 // 5 minutes
        }
      );
    }

    // Load manhole data
    async function loadManholes() {
      const listDiv = document.getElementById('manholeList');
      listDiv.innerHTML = '<div class="loading">マンホールデータを読み込み中...</div>';

      try {
        // Try multiple potential paths for pokefuta data
        const pokefutaPaths = [
          'pokefuta.ndjson',    // Direct filename
          './pokefuta.ndjson',  // Current relative path
          '../pokefuta.ndjson', // Parent directory
          'https://raw.githubusercontent.com/nishiokya/pokefuta-tracker/main/docs/pokefuta.ndjson' // Fallback to GitHub raw
        ];
        
        let response = null;
        for (const path of pokefutaPaths) {
          try {
            console.log(`Trying to fetch pokefuta data from: ${path}`);
            response = await fetch(path);
            if (response.ok) {
              console.log(`Successfully loaded pokefuta data from: ${path}`);
              break;
            }
          } catch (e) {
            console.warn(`Failed to fetch from ${path}:`, e);
          }
        }
        
        if (!response || !response.ok) {
          throw new Error('Could not load pokefuta data from any path');
        }
        
        const text = await response.text();
        const lines = text.trim().split('\n');

        // Parse NDJSON and deduplicate by id
        const manholeMap = new Map();
        lines.forEach(line => {
          if (line.trim()) {
            const manhole = JSON.parse(line);
            // Keep the latest entry for each ID
            if (!manholeMap.has(manhole.id) ||
                new Date(manhole.source_last_checked) > new Date(manholeMap.get(manhole.id).source_last_checked)) {
              manholeMap.set(manhole.id, manhole);
            }
          }
        });

        allManholes = Array.from(manholeMap.values());

        // Add distance information
        allManholes.forEach(manhole => {
          if (userLocation) {
            manhole.distance = calculateDistance(
              userLocation.lat, userLocation.lng,
              manhole.lat, manhole.lng
            );
          }
        });

        filterManholes();
      } catch (error) {
        console.error('Error loading manholes:', error);
        listDiv.innerHTML = '<div class="error">マンホールデータの読み込みに失敗しました</div>';
      }
    }

    // Filter and display manholes
    function filterManholes() {
      const listDiv = document.getElementById('manholeList');
      const maxDistance = parseFloat(document.getElementById('distanceSelect').value);

      if (!userLocation || allManholes.length === 0) {
        return;
      }

      // Filter by distance and sort by distance
      const filteredManholes = allManholes
        .filter(manhole => manhole.distance <= maxDistance)
        .sort((a, b) => a.distance - b.distance);

      if (filteredManholes.length === 0) {
        listDiv.innerHTML = '<div class="no-results">指定した範囲内にマンホールが見つかりませんでした</div>';
        return;
      }

      // Generate HTML
      const html = filteredManholes.map(manhole => {
        const mapsUrl = `https://www.google.com/maps?q=${encodeURIComponent(`${manhole.lat},${manhole.lng}`)}`;
        const pokefutaUrl = manhole.detail_url || `https://local.pokemon.jp/manhole/detail/${manhole.id}/`;
        const title = escapeHtml(manhole.title || `マンホール #${manhole.id}`);
        const prefecture = escapeHtml(manhole.prefecture);
        const city = escapeHtml(manhole.city);
        const officialHref = escapeAttribute(pokefutaUrl);
        const mapsHref = escapeAttribute(mapsUrl);
        const pokemonBadges = (manhole.pokemons || [])
          .map(pokemon => `<span class="manhole-pokemon">${escapeHtml(pokemon)}</span>`)
          .join('');
        return `
        <div class="manhole-item">
          <div class="manhole-info">
            <div class="manhole-title">${title}</div>
            <div class="manhole-location">📍 ${prefecture} ${city}</div>
            <div>
              ${pokemonBadges}
            </div>
          </div>
          <div class="manhole-actions">
            <div class="manhole-distance">${formatDistance(manhole.distance)}</div>
            <a href="${officialHref}" target="_blank" rel="noopener" class="pokefuta-link">公式情報</a>
            <a href="${mapsHref}" target="_blank" rel="noopener" class="maps-link">Google Map</a>
          </div>
        </div>
        `;
      }).join('');

      listDiv.innerHTML = html;
    }

    // Initialize the app
    document.addEventListener('DOMContentLoaded', function() {
      // Auto-get location if the user has previously granted permission
      if (navigator.geolocation && navigator.permissions?.query) {
        navigator.permissions.query({name: 'geolocation'}).then(function(result) {
          if (result.state === 'granted') {
            getCurrentLocation();
          }
        }).catch(function() {
          // Permissions API not supported, do nothing
        });
      }
    });
  </script>
</body>
