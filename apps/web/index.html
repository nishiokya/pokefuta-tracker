  <script>
    window.PREFECTURE_CODE_MAP = Object.freeze({
      '北海道': '01', '青森県': '02', '岩手県': '03', '宮城県': '04', '秋田県': '05',
      '山形県': '06', '福島県': '07', '茨城県': '08', '栃木県': '09', '群馬県': '10',
      '埼玉県': '11', '千葉県': '12', '東京都': '13', '神奈川県': '14', '新潟県': '15',
      '富山県': '16', '石川県': '17', '福井県': '18', '山梨県': '19', '長野県': '20',
      '岐阜県': '21', '静岡県': '22', '愛知県': '23', '三重県': '24', '滋賀県': '25',
      '京都府': '26', '大阪府': '27', '兵庫県': '28', '奈良県': '29', '和歌山県': '30',
      '鳥取県': '31', '島根県': '32', '岡山県': '33', '広島県': '34', '山口県': '35',
      '徳島県': '36', '香川県': '37', '愛媛県': '38', '高知県': '39', '福岡県': '40',
      '佐賀県': '41', '長崎県': '42', '熊本県': '43', '大分県': '44', '宮崎県': '45',
      '鹿児島県': '46', '沖縄県': '47'
    });
    window.SITE_BASE_URL = 'https://data.pokefuta.com/';

    window.resolvePrefectureParam = function(prefParam) {
      if (!prefParam) return '';
      if (prefParam.length === 2 && !isNaN(prefParam)) {
        return Object.entries(window.PREFECTURE_CODE_MAP).find(([, code]) => code === prefParam)?.[0] || '';
      }
      return window.PREFECTURE_CODE_MAP[prefParam] ? prefParam : '';
    };

    window.buildPrefecturePageMeta = function(prefecture) {
      const title = prefecture
        ? `${prefecture}のポケふた マップ | ポケモンマンホール一覧`
        : 'ポケふた マップ | 全国ポケモンマンホール一覧';
      const description = prefecture
        ? `${prefecture}のポケモンマンホール（ポケふた）を地図で確認。設置場所、市町村、登場ポケモンを一覧できます。`
        : '全国のポケモンマンホール（ポケふた）を地図で探索。都道府県・ポケモン名・最近追加フィルタで絞り込み可能。';
      const canonicalUrl = prefecture
        ? `${window.SITE_BASE_URL}?pref=${encodeURIComponent(prefecture)}`
        : window.SITE_BASE_URL;
      return { title, description, canonicalUrl };
    };

    window.applyPrefecturePageMeta = function(prefecture) {
      const meta = window.buildPrefecturePageMeta(prefecture);
      document.title = meta.title;
      document.querySelector('link[rel="canonical"]')?.setAttribute('href', meta.canonicalUrl);
      document.querySelector('meta[name="description"]')?.setAttribute('content', meta.description);
      document.querySelector('meta[property="og:title"]')?.setAttribute('content', meta.title);
      document.querySelector('meta[property="og:description"]')?.setAttribute('content', meta.description);
      document.querySelector('meta[property="og:url"]')?.setAttribute('content', meta.canonicalUrl);
    };

    window.buildCanonicalPath = function(prefecture) {
      return prefecture ? `/?pref=${encodeURIComponent(prefecture)}` : '/';
    };

    window.buildManholeCanonicalPath = function(manholeId) {
      return manholeId ? `/?manhole=${encodeURIComponent(manholeId)}` : '/';
    };

    window.applyManholePageMeta = function(manhole) {
      if (!manhole) return;
      const titleBase = manhole.title || `ポケふた ${manhole.id}`;
      const pokemonText = Array.isArray(manhole.pokemons) && manhole.pokemons.length
        ? `登場ポケモン: ${manhole.pokemons.join(', ')}。`
        : '';
      const placeText = [manhole.prefecture, manhole.city].filter(Boolean).join(' ');
      const title = `${titleBase} | ポケふた マップ`;
      const description = `${placeText ? `${placeText}の` : ''}ポケモンマンホール（ポケふた）を地図で確認。${pokemonText}`.trim();
      const canonicalUrl = `${window.SITE_BASE_URL}?manhole=${encodeURIComponent(manhole.id)}`;
      document.title = title;
      document.querySelector('link[rel="canonical"]')?.setAttribute('href', canonicalUrl);
      document.querySelector('meta[name="description"]')?.setAttribute('content', description);
      document.querySelector('meta[property="og:title"]')?.setAttribute('content', title);
      document.querySelector('meta[property="og:description"]')?.setAttribute('content', description);
      document.querySelector('meta[property="og:url"]')?.setAttribute('content', canonicalUrl);
      window.applyManholeJsonLd(manhole);
    };

    window.applyManholeJsonLd = function(manhole) {
      if (!manhole) return;
      // 既存のJSON-LDを削除
      const existingScript = document.querySelector('script[type="application/ld+json"][data-manhole-id]');
      if (existingScript) existingScript.remove();

      // ポケモン名から"ローカルActs"を除外
      const cleanPokemons = Array.isArray(manhole.pokemons)
        ? manhole.pokemons.filter(p => !p.includes('ローカルActs')).slice(0, 3)
        : [];

      const placeText = [manhole.prefecture, manhole.city].filter(Boolean).join('');
      const titleBase = manhole.title || `ポケふた ${manhole.id}`;
      const baseDescription = `${placeText ? `${placeText}の` : ''}ポケモンマンホール（ポケふた）。`;
      const pokemonDescription = cleanPokemons.length > 0
        ? `登場ポケモン: ${cleanPokemons.join(', ')}`
        : '';
      const description = [baseDescription, pokemonDescription].filter(Boolean).join(' ');

      const jsonLd = {
        '@context': 'https://schema.org',
        '@type': 'Place',
        'name': titleBase,
        'description': description,
        'geo': {
          '@type': 'GeoCoordinates',
          'latitude': manhole.lat,
          'longitude': manhole.lng
        },
        'address': {
          '@type': 'PostalAddress',
          'addressRegion': manhole.prefecture || '',
          'addressLocality': manhole.city || '',
          'streetAddress': manhole.address || ''
        },
        'url': `${window.SITE_BASE_URL}?manhole=${encodeURIComponent(manhole.id)}`
      };

      // 画像 URL があれば追加
      if (manhole.id) {
        jsonLd['image'] = `https://data.pokefuta.com/manhole/image/${encodeURIComponent(manhole.id)}_latest.jpeg`;
      }

      // keywords にポケモン名を追加
      const keywordsArray = ['ポケふた', 'ポケモンマンホール', titleBase, ...cleanPokemons];
      jsonLd['keywords'] = keywordsArray.join(', ');

      const script = document.createElement('script');
      script.type = 'application/ld+json';
      script.setAttribute('data-manhole-id', manhole.id);
      script.textContent = JSON.stringify(jsonLd);
      document.head.appendChild(script);
    };

    (function initPrefectureCanonical() {
      const params = new URLSearchParams(window.location.search);
      const prefParam = params.get('pref');
      const prefecture = window.resolvePrefectureParam(prefParam);
      if (!prefecture) return;

      window.applyPrefecturePageMeta(prefecture);
      if (prefParam !== prefecture || window.location.pathname.endsWith('/index.html')) {
        window.history.replaceState({ pref: prefecture }, '', window.buildCanonicalPath(prefecture));
      }
    })();
  </script>

    // URL パラメータから初期都道府県を取得する関数

      const params = new URLSearchParams(window.location.search);

      return /^[0-9A-Za-z_-]+$/.test(manholeId) ? manholeId : null;

    // Validate prefecture site URL (whitelist check)
    function validatePrefectureSiteUrl(rawUrl) {
      try {
        const url = new URL(rawUrl);
        const allowedHost = 'local.pokemon.jp';
        if (url.protocol === 'https:' && url.hostname === allowedHost) {
          return url;
        }
      } catch {
        return null;
      }
      return null;
    }

    function validateDetailUrl(rawUrl) {
      try {
        const url = new URL(rawUrl);
        const allowedHost = 'local.pokemon.jp';
        if (url.protocol === 'https:' && url.hostname === allowedHost) {
          return url;
        }
      } catch {
        return null;
      }
      return null;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));

    }

      const safeId = String(id ?? '').trim();
      return safeId ? window.buildManholeCanonicalPath(safeId) : '';
    }

      const path = getManholePageUrl(id);
      return path ? new URL(path, window.location.origin).href : '';

    async function shareManholeUrl(button) {
      const url = button?.dataset.shareUrl;
      if (!url) return;
      const title = button.dataset.shareTitle || 'ポケふた';
      if (navigator.share) {
        try {
          await navigator.share({ title, url });
          return;
        } catch (error) {
          if (error?.name === 'AbortError') return;
        }
      }
      if (navigator.clipboard?.writeText) {
        try {
          await navigator.clipboard.writeText(url);
          const originalText = button.textContent;
          button.textContent = 'コピー済み';
          window.setTimeout(() => {
            button.textContent = originalText || '共有';
          }, 1400);
          return;
        } catch (error) {
          console.warn('クリップボードへのコピーに失敗しました', error);
        }
      }
      window.prompt('共有URLをコピーしてください', url);
    }

    document.addEventListener('click', event => {
      const shareButton = event.target.closest('[data-share-url]');
      if (!shareButton) return;
      event.preventDefault();
      shareManholeUrl(shareButton).catch(error => {
        console.warn('URLの共有に失敗しました', error);
      });
    });

    function formatPhotoDate(rawDate) {
      if (!rawDate) return '';
      const date = new Date(rawDate);
      if (Number.isNaN(date.getTime())) return '';
      return new Intl.DateTimeFormat('ja-JP', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      }).format(date);
    }

    function getLatestPhotoMeta(id) {
      const meta = latestPhotoMeta[String(id)] || latestPhotoMeta[Number(id)];
      return meta || null;
    }

    function getPhotoTakenDate(id) {
      const meta = getLatestPhotoMeta(id);
      return formatPhotoDate(meta?.shot_at || meta?.created_at);

    async function loadLatestPhotoMeta() {

      }
    }

    async function loadPokefutaData() {
      try {
        // Try multiple potential paths for pokefuta data
        const pokefutaPaths = [
          './pokefuta.ndjson',  // Current relative path
          'pokefuta.ndjson',    // Direct filename
          '../pokefuta.ndjson', // Parent directory
          'https://raw.githubusercontent.com/nishiokya/pokefuta-tracker/main/docs/pokefuta.ndjson' // Fallback to GitHub raw
        ];
        
        let res = null;
        for (const path of pokefutaPaths) {
          try {
            console.log(`Trying to fetch pokefuta data from: ${path}`);
            res = await fetch(path, { cache: 'no-store' });
            if (res.ok) {
              console.log(`Successfully loaded pokefuta data from: ${path}`);
              break;
            }
          } catch (e) {
            console.warn(`Failed to fetch from ${path}:`, e);
          }
        }
        
        if (!res || !res.ok) {
          throw new Error('Could not load pokefuta data from any path');
        }
        
        const text = await res.text();
        const lines = text.trim().split('\n');
        allData = [];
        // 集約: 同一 id の複数レコードが存在する場合
        //   ・added_at / first_seen は最古値
        //   ・last_seen / source_last_checked / last_updated は最新値
        //   ・その他フィールドは最新レコードをベース
        const aggById = new Map();
        for (const line of lines) {
          if (!line.trim()) continue;
          let obj; try { obj = JSON.parse(line); } catch { continue; }
          const existing = aggById.get(obj.id);
          if (!existing) {
            aggById.set(obj.id, { ...obj });
          } else {
            function earlier(a,b){ if(!a) return b; if(!b) return a; return new Date(a) <= new Date(b) ? a : b; }
            function later(a,b){ if(!a) return b; if(!b) return a; return new Date(a) >= new Date(b) ? a : b; }
            // keep earliest for creation-ish fields
            existing.added_at = earlier(existing.added_at, obj.added_at);
            existing.first_seen = earlier(existing.first_seen, obj.first_seen);
            // keep latest for observation-ish fields
            existing.last_seen = later(existing.last_seen, obj.last_seen);
            existing.source_last_checked = later(existing.source_last_checked, obj.source_last_checked);
            existing.last_updated = later(existing.last_updated, obj.last_updated);
            // Preserve first non-empty prefecture_site_url
            const prefUrlToKeep = existing.prefecture_site_url || obj.prefecture_site_url;
            // For other mutable fields (title, pokemons etc.) assume latest line is authoritative
            Object.assign(existing, obj, {
              added_at: existing.added_at,
              first_seen: existing.first_seen,
              last_seen: existing.last_seen,
              source_last_checked: existing.source_last_checked,
              last_updated: existing.last_updated,
              prefecture_site_url: prefUrlToKeep
            });
          }
        }
        allData = [...aggById.values()];
  // Detect presence of date field for recent filter (include source_last_checked / last_seen)
  hasAddedAtField = allData.some(d => d.added_at || d.first_seen || d.last_seen || d.source_last_checked || d.last_updated || d.date);
        // 日付文字列の正規化 (Safari 互換 / microseconds 除去 / +00:00 → Z)
        function normalizeDateString(ds) {
          if (!ds) return null;
          let cleaned = ds.trim();
          // If fractional seconds are more than 3 digits, trim to milliseconds (Safari 対応)
          cleaned = cleaned.replace(/(\.\d{3})\d+(?=(Z|[+\-]\d{2}:?\d{2})?$)/, '$1');
          // If any fractional seconds remain with more than 6 digits, drop entirely
          cleaned = cleaned.replace(/\.\d{4,6}(?=(Z|[+\-]\d{2}:?\d{2})?$)/, match => match.slice(0,4));
          // Convert +00:00 to Z for consistency
          cleaned = cleaned.replace(/\+00:00$/, 'Z');
          // If timezone missing but pattern looks like ISO, append Z
          if (!/(Z|[+\-]\d{2}:?\d{2})$/.test(cleaned) && /T\d{2}:\d{2}:\d{2}/.test(cleaned)) cleaned += 'Z';
          const t = Date.parse(cleaned);
          return isNaN(t) ? null : new Date(t);
        }
        // Pre-compute reference date for "recent" filter
        // 優先順位: added_at > first_seen > last_seen > source_last_checked > last_updated > date
        allData.forEach(d => {
          const raw = d.added_at || d.first_seen || d.last_seen || d.source_last_checked || d.last_updated || d.date;
          d._addedDate = normalizeDateString(raw);
        });
        await loadLatestPhotoMeta();
        initMarkerLayer();
        // Build markers
        allMarkers = [];
        prefectureCounts = {}; cityCounts = {}; pokemonCounts = {};
        allData.forEach(d => {
          const prefecture = d.prefecture || '不明';
          const prefectureCode = window.PREFECTURE_CODE_MAP[prefecture] || '--';
          prefectureCounts[prefecture] = (prefectureCounts[prefecture] || 0) + 1;
          if (d.city) cityCounts[d.city] = (cityCounts[d.city] || 0) + 1;
          if (Array.isArray(d.pokemons)) {
            d.pokemons.forEach(p => { if (p) pokemonCounts[p] = (pokemonCounts[p] || 0) + 1; });
          }
          const popupContent = buildPokefutaPopup(d);
          const marker = L.marker([d.lat, d.lng], { icon: pokefutaIcon }).bindPopup(popupContent, pokefutaPopupOptions);
          marker.on('click', collapseBottomSheet);
          marker.pokefutaData = d; marker.pokefutaData.prefectureCode = prefectureCode;
          allMarkers.push(marker);
          markerLayer.addLayer(marker);
        });
        
        // 都道府県ごとのマンホール数と bounding box マップを構築（グローバル変数を使用）
        // マンホール2件以上: 実データのbbox（最小縮尺）、1件以下: 実マーカー座標±0.5度（統一スケール）
        prefectureBounds = {};
        prefectureMarkerCounts = {};
        
        // マンホールがある県の bbox と数をカウント
        const prefectureCoords = {};
        allMarkers.forEach(marker => {
          const pref = marker.pokefutaData.prefecture || '不明';  // undefined を正規化
          if (!prefectureCoords[pref]) prefectureCoords[pref] = [];
          prefectureCoords[pref].push([marker.pokefutaData.lat, marker.pokefutaData.lng]);
        });
        
        // 各県の bbox を計算（2件以上のみ実データbboxを使用）
        for (const [pref, coords] of Object.entries(prefectureCoords)) {
          prefectureMarkerCounts[pref] = coords.length;
          
          if (coords.length >= 2) {
            // マンホール2件以上: 実データから最大・最小を計算（最小縮尺）
            const lats = coords.map(c => c[0]);
            const lngs = coords.map(c => c[1]);
            const minLat = Math.min(...lats);
            const maxLat = Math.max(...lats);
            const minLng = Math.min(...lngs);
            const maxLng = Math.max(...lngs);
            prefectureBounds[pref] = [[minLat, minLng], [maxLat, maxLng]];
          } else {
            // マンホール1件: 実マーカー座標を中心に±PREFECTURE_BOUNDS_OFFSETを使用（統一スケール）
            const markerCoord = coords[0];
            if (markerCoord) {
              prefectureBounds[pref] = [
                [markerCoord[0] - PREFECTURE_BOUNDS_OFFSET, markerCoord[1] - PREFECTURE_BOUNDS_OFFSET],  // 南西
                [markerCoord[0] + PREFECTURE_BOUNDS_OFFSET, markerCoord[1] + PREFECTURE_BOUNDS_OFFSET]   // 北東
              ];
            }
          }
        }
        
        // マンホールがない県は全て Gist 中心座標から ±PREFECTURE_BOUNDS_OFFSETで仮想 box
        for (const [pref, center] of Object.entries(prefectureCenterCoords)) {
          if (!prefectureBounds[pref]) {
            prefectureMarkerCounts[pref] = 0;  // マンホール0件
            prefectureBounds[pref] = [
              [center[0] - PREFECTURE_BOUNDS_OFFSET, center[1] - PREFECTURE_BOUNDS_OFFSET],  // 南西
              [center[0] + PREFECTURE_BOUNDS_OFFSET, center[1] + PREFECTURE_BOUNDS_OFFSET]   // 北東
            ];
          }
        }
        
        populatePrefectureTable();
        updateStats();
        initRecentFilter();
        updateRecentSummary();
        renderRecentAdded();
        syncExploreSections();
        // URL パラメータから初期表示を選択
        const initialManholeId = getInitialManholeIdFromURL();
        if (initialManholeId) {
          console.log(`Initial manhole from URL: ${initialManholeId}`);
          if (openManholePopup(initialManholeId)) return;
        }

        const initialPref = getInitialPrefectureFromURL();
        console.log(`Initial prefecture from URL: ${initialPref}`);
        if (initialPref) {
          // マンホール有無に関わらず処理（0件の県でもズーム）
          filterByPrefectureFromTable(initialPref);
          showSelectedPrefectureBadge();
          // 地図をその都道府県にズーム
          setTimeout(() => zoomToPrefecture(initialPref), 100);
        }
      } catch (e) {
        console.error('ポケふたデータ読み込み失敗', e);
      }
    }

    function openManholePopup(manholeId) {
      const marker = allMarkers.find(item => String(item.pokefutaData?.id) === String(manholeId));
      if (!marker) {
        console.warn(`No manhole found for id: ${manholeId}`);
        return false;
      }

      if (markerLayer && !markerLayer.hasLayer(marker)) markerLayer.addLayer(marker);
      const data = marker.pokefutaData;
      window.applyManholePageMeta(data);
      window.history.replaceState({ manhole: data.id }, '', window.buildManholeCanonicalPath(data.id));
      const openPopup = () => {
        map.setView([data.lat, data.lng], Math.max(map.getZoom(), 15), { animate: false });
        marker.openPopup();
      };
      if (markerLayer && typeof markerLayer.zoomToShowLayer === 'function') {
        markerLayer.zoomToShowLayer(marker, openPopup);
      } else {
        openPopup();
      }
      return true;
    }

    function initMarkerLayer() {
      if (markerLayer && map.hasLayer(markerLayer)) map.removeLayer(markerLayer);
      if (L.markerClusterGroup) {
        markerLayer = L.markerClusterGroup({
          showCoverageOnHover: false,
          removeOutsideVisibleBounds: false,
          disableClusteringAtZoom: 8,
          maxClusterRadius: 48,
          iconCreateFunction(cluster) {
            const count = cluster.getChildCount();
            const size = count >= 100 ? 'large' : count >= 20 ? 'medium' : 'small';
            return L.divIcon({
              html: `<span>${count}</span>`,
              className: `pokefuta-cluster pokefuta-cluster--${size}`,
              iconSize: L.point(size === 'large' ? 58 : size === 'medium' ? 50 : 42, size === 'large' ? 58 : size === 'medium' ? 50 : 42)
            });
          }
        });
      } else {
        markerLayer = L.layerGroup();
      }
      markerLayer.addTo(map);
    }

    function initRecentFilter() {
      const toggle = document.getElementById('recent-toggle');
      if (!toggle) return;
      if (!hasAddedAtField) {
        toggle.disabled = true;
        toggle.title = 'データに日付フィールド (added_at / first_seen / last_seen / source_last_checked / last_updated / date) が無いため利用できません';
      }
      syncExploreSections();
      toggle.addEventListener('change', e => {
        filterRecent = e.target.checked;
        if (filterRecent) {
          showPrefectureCards = false;
          showNearbyResults = false;
        }
        syncExploreSections();
        recomputeVisibility();
        updateRecentSummary();
        if (filterRecent) {
          zoomToRecentMarkers();
          expandBottomSheet();
        }
      });
    }

    function syncExploreSections() {
      const prefButton = document.getElementById('prefecture-open-button');
      const recentButton = document.querySelector('.sheet-action-btn--toggle');
      const nearbyButton = document.getElementById('locate-button');
      const prefectureList = document.getElementById('prefecture-table-wrapper');
      const recentPanel = document.getElementById('recent-added-panel');
      const nearbyPanel = document.getElementById('nearby-results');

      prefButton?.classList.toggle('active', showPrefectureCards);
      prefButton?.setAttribute('aria-pressed', String(showPrefectureCards));
      recentButton?.classList.toggle('active', filterRecent);
      nearbyButton?.classList.toggle('active', showNearbyResults);
      nearbyButton?.setAttribute('aria-pressed', String(showNearbyResults));
      if (prefectureList) prefectureList.hidden = !showPrefectureCards;
      if (recentPanel) recentPanel.hidden = !filterRecent;
      if (nearbyPanel) nearbyPanel.hidden = !showNearbyResults || !nearbyPanel.dataset.hasResults;
    }

    function zoomToRecentMarkers() {
      const recentMarkers = allMarkers.filter(marker => {
        const d = marker.pokefutaData;
        return isWithinLastDays(d?._addedDate, 30);
      });
      if (!recentMarkers.length) return;
      try {
        const group = L.featureGroup(recentMarkers);
        map.fitBounds(group.getBounds(), {
          padding: [56, 56],
          maxZoom: 11
        });
      } catch (error) {
        console.warn('Could not zoom to recent markers:', error);
      }
    }

// Prefecture table toggle機能は削除済み（テーブル自体は残存）

    function initControlsToggle() {
      const toggleBtn = document.getElementById('controls-toggle');
      const controlsContent = document.getElementById('controls-content');
      if (!toggleBtn || !controlsContent) return;
      collapseBottomSheet();
      toggleBtn.addEventListener('click', () => {
        const expanded = document.body.classList.contains('sheet-expanded');
        expanded ? collapseBottomSheet() : expandBottomSheet();
      });
      document.getElementById('prefecture-open-button')?.addEventListener('click', () => {
        expandBottomSheet();
        showPrefectureCards = true;
        showNearbyResults = false;
        filterRecent = false;
        const recentToggle = document.getElementById('recent-toggle');
        if (recentToggle) recentToggle.checked = false;
        recomputeVisibility();
        syncExploreSections();
      });
      let startY = 0;
      toggleBtn.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
      toggleBtn.addEventListener('touchend', e => {
        const dy = e.changedTouches[0].clientY - startY;
        if (dy < -20) expandBottomSheet();
        if (dy > 20) collapseBottomSheet();
      }, { passive: true });
    }

    function expandBottomSheet() {
      document.body.classList.add('sheet-expanded');
      const toggleBtn = document.getElementById('controls-toggle');
      toggleBtn?.setAttribute('aria-expanded', 'true');
      toggleBtn?.setAttribute('aria-label', '都道府県リストを閉じる');
      setTimeout(() => map.invalidateSize(), 160);
    }

    function collapseBottomSheet() {
      document.body.classList.remove('sheet-expanded');
      const toggleBtn = document.getElementById('controls-toggle');
      toggleBtn?.setAttribute('aria-expanded', 'false');
      toggleBtn?.setAttribute('aria-label', '都道府県リストを開く');
      setTimeout(() => map.invalidateSize(), 160);
    }

    function countRecent(days=30){
      const now = Date.now();
      const span = days*86400000;
      let c=0; allData.forEach(d=>{ if(d._addedDate){ const diff = now - d._addedDate.getTime(); if(diff>=0 && diff<=span) c++; }}); return c;
    }

    function ensureRecentSummaryElement(){
      let el = document.getElementById('recent-summary');
      return el;
    }

    function updateRecentSummary(){
      const el = ensureRecentSummaryElement();
      if(!el) return;
      if(!hasAddedAtField){ el.textContent='日付フィールドなし'; return; }
      const recentCnt = countRecent(30);
      const total = allData.length;
      el.textContent=`${recentCnt} / ${total}`;
    }

    function isWithinLastDays(dateObj, days) {
      if (!dateObj) return false;
      const now = new Date();
      return (now - dateObj) <= days * 86400000 && (now - dateObj) >= 0;
    }

    function recomputeVisibility() {
      let visibleCount = 0;
      allMarkers.forEach(marker => {
        const d = marker.pokefutaData;
        let show = true;
        if (selectedPrefecture) show = show && d.prefecture === selectedPrefecture;
        if (selectedPokemons.length > 0) {
          const pList = d.pokemons || [];
          show = show && selectedPokemons.some(p => pList.includes(p));
        }
  if (filterRecent) show = show && isWithinLastDays(d._addedDate, 30);
        if (show) {
          if (markerLayer && !markerLayer.hasLayer(marker)) markerLayer.addLayer(marker);
          visibleCount++;
        } else {
          if (markerLayer && markerLayer.hasLayer(marker)) markerLayer.removeLayer(marker);
        }
      });
      updateStats(visibleCount);
    }

    // テーブル行クリック絞り込み用（ドロップダウン廃止）
    function filterByPrefectureFromTable(prefecture) {
      selectedPrefecture = prefecture || '';
      // URL も更新する
      updateURLWithPrefecture(prefecture || null);
      document.querySelectorAll('#prefecture-table-body .prefecture-card').forEach(row => {
        const rowPref = row.dataset.prefecture;
        row.classList.toggle('selected', rowPref === selectedPrefecture && selectedPrefecture);
      });
      renderPrefectureSpots(selectedPrefecture);
      recomputeVisibility();
    }

    function showSelectedPrefectureBadge() {
      const badge = document.getElementById('selected-prefecture-badge');
      const val = badge?.querySelector('.badge-value');
      if (!badge || !val) return;
      if (selectedPrefecture) {
        val.textContent = selectedPrefecture;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
        val.textContent = '';
      }
    }

    function focusSelectedPrefecturePanel() {
      const controlsContent = document.getElementById('controls-content');
      const badge = document.getElementById('selected-prefecture-badge');
      if (!controlsContent || !badge || !selectedPrefecture) return;
      expandBottomSheet();
      requestAnimationFrame(() => {
        const top = Math.max(0, badge.offsetTop - controlsContent.offsetTop - 8);
        controlsContent.scrollTo({ top, behavior: 'smooth' });
      });
    }

    function clearPrefectureSelection() {
      selectedPrefecture = '';
      filterByPrefectureFromTable('');
      showSelectedPrefectureBadge();
      renderPrefectureSpots('');
    }

    function togglePrefectureSelection(prefecture) {
      if (selectedPrefecture === prefecture) {
        clearPrefectureSelection();
      } else {
        filterByPrefectureFromTable(prefecture);
        showSelectedPrefectureBadge();
      }
    }

    // (旧ドロップダウン機能削除済み)
    // ↑ ドロップダウン関連は不要になったため後で削除予定

    function updateStats(visibleOverride) {
      const cityEl = document.getElementById('hero-city-count');
      if (cityEl) cityEl.textContent = String(Object.keys(cityCounts).length);
    }

    // Prefecture table function restored
    function populatePrefectureTable() {
      const tbody = document.getElementById('prefecture-table-body');
      if (!tbody) return;
      tbody.innerHTML = '';

      // Create array of all 47 prefectures with their counts
      const allPrefectures = Object.keys(window.PREFECTURE_CODE_MAP).map(prefecture => [
        prefecture,
        prefectureCounts[prefecture] || 0
      ]);

      // Sort by prefecture code
      allPrefectures.sort(([a], [b]) => {
        const codeA = window.PREFECTURE_CODE_MAP[a];
        const codeB = window.PREFECTURE_CODE_MAP[b];
        return codeA.localeCompare(codeB);
      });

      // Add 不明 at the end if exists
      if (prefectureCounts['不明']) {
        allPrefectures.push(['不明', prefectureCounts['不明']]);
      }

      // Build map of prefecture to site URL (first one found, http(s) & allowlist)
      const prefectureSiteUrls = {};
      const prefectureThumbnails = {};
      const prefectureRecentCounts = {};
      allData.forEach(d => {
        const pref = d.prefecture || '不明';
        if (d.prefecture_site_url && !prefectureSiteUrls[pref]) {
          const validatedUrl = validatePrefectureSiteUrl(d.prefecture_site_url);
          if (validatedUrl) {
            prefectureSiteUrls[pref] = validatedUrl.href;
          }
        }
        if (d.id && !prefectureThumbnails[pref]) {
          prefectureThumbnails[pref] = [];
        }
        if (d.id && prefectureThumbnails[pref] && prefectureThumbnails[pref].length < 4) {
          prefectureThumbnails[pref].push(getLocalManholeImageUrl(d.id));
        }
        if (isWithinLastDays(d._addedDate, 30)) {
          prefectureRecentCounts[pref] = (prefectureRecentCounts[pref] || 0) + 1;
        }
      });

      allPrefectures.forEach(([prefecture, count]) => {
        const row = document.createElement('article');
        const code = window.PREFECTURE_CODE_MAP[prefecture] || '--';
        const siteUrl = prefectureSiteUrls[prefecture];
        const thumbnailUrls = prefectureThumbnails[prefecture] || [];
        const recentCount = prefectureRecentCounts[prefecture] || 0;
        let siteCell = '<span class="prefecture-site-link prefecture-site-link--empty">公式サイトなし</span>';
        if (siteUrl) {
          const anchor = document.createElement('a');
          anchor.href = siteUrl;
          anchor.target = '_blank';
          anchor.rel = 'noopener noreferrer';
          anchor.className = 'prefecture-site-link';
          anchor.textContent = `${prefecture}${UI_TEXT.prefectureSite}`;
          siteCell = anchor.outerHTML;
        }

        // Style row differently if no pokefuta
        const countBadgeClass = count > 0 ? 'count-badge' : 'count-badge-zero';
        const rowClass = count === 0 ? 'no-pokefuta' : '';

        row.className = `prefecture-card ${rowClass}`;
        row.dataset.prefecture = prefecture;
        row.innerHTML = `
          <div class="prefecture-card-main" role="button" tabindex="${count === 0 ? '-1' : '0'}" aria-disabled="${count === 0 ? 'true' : 'false'}">
            <span class="prefecture-code">${code}</span>
            <span class="prefecture-card-name">${prefecture}</span>
            <span class="prefecture-card-meta">
              ${recentCount > 0 ? `<span class="prefecture-new-badge"><img src="./assets/icon-fire.svg" alt="" aria-hidden="true">NEW</span>` : ''}
              ${siteCell}
            </span>
            <span class="${countBadgeClass}">${count}枚</span>
          </div>
          <div class="prefecture-card-gallery" aria-hidden="true">
            ${thumbnailUrls.length ? thumbnailUrls.map(url => `
              <span class="prefecture-card-thumb">
                <img src="${url}" alt="" loading="lazy" decoding="async" onerror="this.closest('.prefecture-card-thumb').classList.add('is-missing'); this.remove();">
              </span>
            `).join('') : '<span class="prefecture-card-thumb is-missing"></span>'}
          </div>
        `;
        if (count > 0) {
          const button = row.querySelector('.prefecture-card-main');
          const selectPrefecture = () => {
            filterByPrefectureFromTable(prefecture);
            showSelectedPrefectureBadge();
            zoomToPrefecture(prefecture);
            focusSelectedPrefecturePanel();
          };
          button.addEventListener('click', selectPrefecture);
          button.addEventListener('keydown', event => {
            if (event.key !== 'Enter' && event.key !== ' ') return;
            event.preventDefault();
            selectPrefecture();
          });
          button.title = `${prefecture}のポケふたを地図で見る`;
        }
        // Append row
        tbody.appendChild(row);
        // Prevent row handlers from triggering when interacting with prefecture link
        const linkEl = row.querySelector('.prefecture-site-link');
        if (linkEl) {
          const stopRowPropagation = e => e.stopPropagation();
          linkEl.addEventListener('click', stopRowPropagation);
          linkEl.addEventListener('dblclick', stopRowPropagation);
        }
      });
    }

    function renderRecentAdded() {
      const list = document.getElementById('recent-added-list');
      if (!list) return;
      const recentItems = [...allData]
        .filter(d => isWithinLastDays(d._addedDate, 30))
        .sort((a, b) => b._addedDate - a._addedDate);
      renderSpotResults(list, recentItems, {
        emptyMessage: '直近30日の追加はありません。',
        meta: d => [d.prefecture || '不明', d.title || 'ポケふた'].join(' / '),
        badge: () => '<img src="./assets/icon-fire.svg" alt="" aria-hidden="true">NEW',
        limit: 24
      });
    }

    function bindSpotResultList(list) {
      if (!list || list.dataset.boundSpotResults) return;
      list.dataset.boundSpotResults = 'true';
      list.addEventListener('click', event => {
        const button = event.target.closest('.prefecture-spot-item[data-manhole-id]');
        if (!button || !list.contains(button)) return;
        openManholePopup(button.dataset.manholeId);
        collapseBottomSheet();
      });
    }

    function renderSpotResults(list, spots, options = {}) {
      bindSpotResultList(list);
      const {
        emptyMessage = '',
        meta,
        badge,
        badgeClass = 'prefecture-spot-new',
        limit = 24
      } = options;
      const visibleSpots = spots.slice(0, limit);
      if (!visibleSpots.length) {
        list.innerHTML = emptyMessage ? `<p class="recent-added-empty">${escapeHtml(emptyMessage)}</p>` : '';
        return;
      }
      list.innerHTML = visibleSpots.map(d => {
        const metaText = meta ? meta(d) : (d.title || 'ポケふた');
        const badgeText = badge ? badge(d) : '';
        return `
          <button type="button" class="prefecture-spot-item" data-manhole-id="${escapeHtml(d.id)}">
            <span class="prefecture-spot-thumb" aria-hidden="true">
              <img src="${getLocalManholeImageUrl(d.id)}" alt="" loading="lazy" decoding="async" onerror="this.closest('.prefecture-spot-thumb').classList.add('is-missing'); this.remove();">
            </span>
            <span class="prefecture-spot-copy">
              <strong>${escapeHtml(d.city || '自治体未設定')}</strong>
              <small>${escapeHtml(metaText)}</small>
            </span>
            ${badgeText ? `<span class="${badgeClass}">${badgeText}</span>` : ''}
          </button>
        `;
      }).join('');
    }

    function renderPrefectureSpots(prefecture) {
      const panel = document.getElementById('prefecture-spots-panel');
      const list = document.getElementById('prefecture-spots-list');
      const heading = document.getElementById('prefecture-spots-heading');
      if (!panel || !list || !heading) return;
      if (!prefecture) {
        panel.hidden = true;
        list.innerHTML = '';
        return;
      }
      const spots = allData
        .filter(d => d.prefecture === prefecture)
        .sort((a, b) => String(a.city || '').localeCompare(String(b.city || ''), 'ja'));
      heading.textContent = `${prefecture}のポケふた`;
      renderSpotResults(list, spots, {
        limit: 24,
        badge: d => isWithinLastDays(d._addedDate, 30) ? '<img src="./assets/icon-fire.svg" alt="" aria-hidden="true">NEW' : ''
      });
      panel.hidden = spots.length === 0;
    }

    function distanceKm(aLat, aLng, bLat, bLng) {
      const toRad = deg => deg * Math.PI / 180;
      const r = 6371;
      const dLat = toRad(bLat - aLat);
      const dLng = toRad(bLng - aLng);
      const s = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(aLat)) * Math.cos(toRad(bLat)) * Math.sin(dLng / 2) ** 2;
      return 2 * r * Math.asin(Math.sqrt(s));
    }

    function renderNearbyResults(lat, lng) {
      const section = document.getElementById('nearby-results');
      const list = document.getElementById('nearby-list');
      if (!section || !list) return;
      const nearest = allData
        .filter(d => d.lat != null && d.lng != null)
        .map(d => ({ ...d, distance: distanceKm(lat, lng, Number(d.lat), Number(d.lng)) }))
        .sort((a, b) => a.distance - b.distance)
        .slice(0, 5);
      if (!nearest.length) {
        list.innerHTML = '';
        section.dataset.hasResults = '';
        showNearbyResults = false;
        syncExploreSections();
        return;
      }
      renderSpotResults(list, nearest, {
        meta: d => [d.prefecture || '不明', d.title || 'ポケふた'].join(' / '),
        badge: d => `${d.distance.toFixed(1)}km`,
        badgeClass: 'prefecture-spot-distance'
      });
      section.dataset.hasResults = 'true';
      showNearbyResults = true;
      showPrefectureCards = false;
      filterRecent = false;
      const recentToggle = document.getElementById('recent-toggle');
      if (recentToggle) recentToggle.checked = false;
      syncExploreSections();
    }

    function initLocationSearch() {
      const button = document.getElementById('locate-button');
      const label = document.getElementById('locate-button-label');
      if (!button) return;
      const defaultLabel = label?.textContent || '近くのポケふた';
      const setButtonState = (text, options = {}) => {
        const { busy = false, resetAfter = 0 } = options;
        button.disabled = busy;
        button.setAttribute('aria-busy', String(busy));
        if (label) label.textContent = text;
        if (resetAfter) {
          window.setTimeout(() => {
            if (label) label.textContent = defaultLabel;
            button.removeAttribute('aria-busy');
          }, resetAfter);
        }
      };
      button.addEventListener('click', () => {
        if (!navigator.geolocation) {
          setButtonState('現在地を使えません', { resetAfter: 1800 });
          expandBottomSheet();
          return;
        }
        setButtonState('確認中...', { busy: true });
        navigator.geolocation.getCurrentPosition(position => {
          const { latitude, longitude } = position.coords;
          setButtonState(defaultLabel);
          if (userLocationMarker) map.removeLayer(userLocationMarker);
          userLocationMarker = L.circleMarker([latitude, longitude], {
            radius: 8,
            color: '#ffffff',
            weight: 3,
            fillColor: '#2f80ed',
            fillOpacity: 0.95
          }).addTo(map);
          renderNearbyResults(latitude, longitude);
          const nearestMarkers = allMarkers
            .map(marker => ({ marker, d: marker.pokefutaData, distance: distanceKm(latitude, longitude, marker.pokefutaData.lat, marker.pokefutaData.lng) }))
            .sort((a, b) => a.distance - b.distance)
            .slice(0, 5)
            .map(item => item.marker);
          const group = L.featureGroup([userLocationMarker, ...nearestMarkers]);
          map.fitBounds(group.getBounds(), { padding: [48, 48], maxZoom: 13 });
          expandBottomSheet();
        }, () => {
          setButtonState('取得できませんでした', { resetAfter: 1800 });
          expandBottomSheet();
        }, { enableHighAccuracy: false, timeout: 10000, maximumAge: 300000 });
      });
    }

    // 多言語機能削除のため switchLanguage / refreshMarkersContent は不要

    // Leafletの機能を使って都道府県のポケふたにズームする関数
    // マンホール2件以上: マンホール全て入る最小縮尺（maxZoom:13で過度な拡大を防止）
    // マンホール1件以下: 実マーカー座標 or Gist中心座標 ±0.5度で統一スケール
    function zoomToPrefecture(prefecture) {
      const markerCount = prefectureMarkerCounts[prefecture] || 0;
      console.log(`Zooming to prefecture: ${prefecture}, marker count: ${markerCount}, prefectureBounds available: ${!!prefectureBounds[prefecture]}`);
      
      // prefectureBounds がない場合はフォールバック
      if (!prefectureBounds || !prefectureBounds[prefecture]) {
        console.warn(`No bounds found for prefecture: ${prefecture}`);
        const center = prefectureCenterCoords[prefecture];
        if (center) {
          map.setView(center, 8);
        }
        return;
      }
      
      try {
        const bounds = L.latLngBounds(prefectureBounds[prefecture]);
        
        if (markerCount >= 2) {
          // マンホール2件以上: マンホール全て入る最小縮尺でズーム（maxZoom: 13で過度な拡大を防止）
          map.fitBounds(bounds, {
            padding: [50, 50],
            maxZoom: 13
          });
          console.log(`Zoomed to ${prefecture} with ${markerCount} markers (fit all data with zoom cap)`);
        } else {
          // マンホール1件以下: Gist中心座標±0.5度で統一スケール (padding: 50px, maxZoom: 13)
          map.fitBounds(bounds, {
            padding: [50, 50],
            maxZoom: 13
          });
          console.log(`Zoomed to ${prefecture} with ${markerCount} markers (unified scale)`);
        }
        
      } catch (error) {
        console.error(`Error zooming to ${prefecture}:`, error);
        // エラーの場合は都道府県の中心座標にフォールバック
        const center = prefectureCenterCoords[prefecture];
        if (center) {
          map.setView(center, 8);
        }
      }
    }

    // Clean up legacy localStorage keys (searchBoxHidden was from removed search UI)
    function cleanupLegacyLocalStorage() {
      localStorage.removeItem('prefectureTableHidden');
      localStorage.removeItem('searchBoxHidden'); // Removed in UI refactor
    }

    // Initialize
    cleanupLegacyLocalStorage();
    initControlsToggle(); // Initialize toggle early, before data loading
    initLocationSearch();
    loadPokefutaData();
    // Banner 初期化
    (function initSiblingBanner(){
      const banner = document.getElementById('sibling-site-banner');
      if(!banner) return;
      if (document.body.classList.contains('pokefuta-map-page')) return;
      const closed = localStorage.getItem('pf_banner_closed');
      if(!closed) banner.hidden = false;
      const btn = document.getElementById('banner-close');
      if(btn){ btn.addEventListener('click',()=>{ banner.hidden = true; localStorage.setItem('pf_banner_closed','1'); }); }
    })();
  </script>
