name: Check Site Stats Freshness

on:
  workflow_dispatch:
  schedule:
    # 05:30 JST の import-manhole-photos.yml（写真取込 + スナップショット生成）と
    # その Pages デプロイが終わってから検証する。統合前より所要時間が伸びたため
    # 07:00 → 08:00 に後ろ倒ししている（検証が生成を追い越すと毎日誤検知するため）。
    - cron: '0 23 * * *' # 08:00 JST

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run unit tests
        run: python3 -m unittest apps.scraper.test_check_site_stats_freshness

      - name: Compare production stats with upstream snapshot
        run: python3 apps/scraper/check_site_stats_freshness.py
