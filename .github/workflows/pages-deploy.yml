name: Build & Deploy Pokefuta Pages (Artifact)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**' # HTML and assets changes
      - 'apps/scraper/generate_sitemap.py' # sitemap generator used during deploy
      - 'apps/scraper/generate_manhole_pages.py' # manhole page generator
      - 'apps/scraper/generate_manhole_ogp.py' # OGP image generator
      - 'apps/scraper/generate_pokemon_pages.py' # Pokemon LP generator
      - 'apps/scraper/generate_pokemon_index_page.py' # Pokemon index page generator
      - 'apps/scraper/generate_summary_pages.py' # summary page generator
      - 'apps/scraper/generate_summary_ogp.py' # summary page OGP generator
      - 'apps/scraper/generate_prefecture_pages.py' # prefecture page generator
      - 'apps/scraper/inject_site_header.py' # shared header injector
      - 'apps/scraper/generate_prefecture_trivia.py' # prefecture trivia generator
      - 'apps/scraper/generate_top_feed.py' # top page community feed generator
      - 'apps/scraper/prefectures.py' # shared prefecture names and URL slugs
      - 'docs/**'     # dataset changes copied into dist/
      - 'dataset/prefecture_trivia*.json' # generated trivia and editorial sources
      - 'dataset/prefecture_events.json' # prefecture campaign/stamp-rally links
      - 'dataset/gundam_manhole_spots.json' # curated Pokefuta/Gundam crossover experiences
      - 'dataset/aichi_character_manholes.ndjson' # character manholes shown as nearby design spots
      - 'dataset/manhole/image/**' # local popup photos
      - 'tools/**'      # i18n build scripts

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip3 install -r requirements.txt

      - name: Install Japanese fonts (Noto Sans CJK)
        run: sudo apt-get update -y && sudo apt-get install -y fonts-noto-cjk libcairo2

      - name: Generate per-manhole OGP images
        run: |
          mkdir -p dist/assets/ogp/manholes
          python3 apps/scraper/generate_manhole_ogp.py \
            --manholes docs/pokefuta.ndjson \
            --image-dir dataset/manhole/image \
            --photos docs/latest-manhole-photos.json \
            --pokemon docs/pokemon_metadata.json \
            --output dist/assets/ogp/manholes \
            --force

      - name: Prepare dist directory (site + data)
        run: |
          set -e
          mkdir -p dist/assets
          echo "[dist] Validate generated prefecture trivia"
          python3 apps/scraper/generate_prefecture_trivia.py --check
          echo "[dist] Generate static manhole detail pages"
          python3 apps/scraper/generate_manhole_pages.py
          echo "[dist] Generate static Pokemon LP pages"
          python3 apps/scraper/generate_pokemon_pages.py
          echo "[dist] Generate Pokemon index page"
          python3 apps/scraper/generate_pokemon_index_page.py
          echo "[dist] Generate summary OGP image"
          python3 apps/scraper/generate_summary_ogp.py
          echo "[dist] Generate summary pages (ja/en/zh-CN/zh-TW/ko)"
          python3 apps/scraper/generate_summary_pages.py
          echo "[dist] Generate prefecture landing pages (47 prefectures)"
          python3 apps/scraper/generate_prefecture_pages.py
          echo "[dist] Generate sitemap with manhole + pokemon URLs"
          python3 apps/scraper/generate_sitemap.py
          echo "[dist] Copy HTML sources"
          cp apps/web/index.html dist/index.html
          cp apps/web/nearby_manholes.html dist/nearby.html
          cp apps/web/map.html dist/map.html
          cp apps/web/gmanhole_map.html dist/gmanhole_map.html
          cp apps/web/design_manhole.html dist/design_manhole.html
          cp apps/web/login.html dist/login.html
          cp apps/web/sitemap.xml dist/sitemap.xml
          cp apps/web/robots.txt dist/robots.txt
          echo "[dist] Build multilingual pages (en / zh-TW / zh-CN / ko)"
          python3 tools/build_i18n.py
          echo '<!doctype html><meta http-equiv="refresh" content="0; url=./nearby.html">' > dist/nearby_manholes.html
          echo "[dist] Inject shared site header into every HTML page"
          python3 apps/scraper/inject_site_header.py dist
          echo "[dist] Copy assets (CSS + images)"
          cp -r apps/web/assets/* dist/assets/ || true
          echo "[dist] Copy local manhole photos"
          mkdir -p dist/manhole/image
          cp -r dataset/manhole/image/* dist/manhole/image/ || true
          echo "[dist] Copy public dataset from docs/ (generated by update-pokefuta.yml)"
          cp docs/pokefuta.ndjson dist/pokefuta.ndjson || true
          cp docs/gmanhole.ndjson dist/gmanhole.ndjson || true
          cp docs/character_manholes.ndjson dist/character_manholes.ndjson
          cp docs/design_manholes.ndjson dist/design_manholes.ndjson
          cp docs/latest-manhole-photos.json dist/latest-manhole-photos.json
          cp docs/pokemon_metadata.json dist/pokemon_metadata.json || true
          echo "[dist] Copy app data snapshot (generated by import-manhole-photos.yml)"
          mkdir -p dist/api
          cp docs/api/*.json dist/api/
          echo "[dist] Copy prefecture event notices"
          cp dataset/prefecture_events.json dist/api/prefecture_events.json
          echo "[dist] Generate top page community feed"
          python3 apps/scraper/generate_top_feed.py --output dist/api/top-feed.json
          echo "[dist] Listing dist contents"
          find dist -maxdepth 2 -type f -print | sort

      - name: Reject loopback URLs in Pages artifact
        run: |
          python3 .github/scripts/check_production_urls.py \
            --exclude 'supabase-ssr.js' \
            dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
