name: Build & Deploy Pokefuta Pages (Artifact)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 10 * * *' # After daily dataset update

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare dist directory (site + data)
        run: |
          set -e
          mkdir -p dist/assets
          echo "[dist] Copy HTML sources"
          cp apps/web/index.html dist/index.html
          cp apps/web/nearby_manholes.html dist/nearby.html
          cp apps/web/gmanhole_map.html dist/gmanhole_map.html
          echo '<!doctype html><meta http-equiv="refresh" content="0; url=./nearby.html">' > dist/nearby_manholes.html
          echo "[dist] Copy assets (CSS + images)"
          cp -r apps/web/assets/* dist/assets/ || true
          echo "[dist] Copy public dataset from docs/ (generated by update-pokefuta.yml)"
          cp docs/pokefuta.ndjson dist/pokefuta.ndjson || true
          cp apps/web/assets/gmanhole.ndjson dist/gmanhole.ndjson || true
          echo "[dist] Copy manhole icon → assets"
          cp dataset/manhole_icon.png dist/assets/manhole_icon.png || true
          echo "[dist] Listing dist contents"; find dist -maxdepth 2 -type f -print | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
