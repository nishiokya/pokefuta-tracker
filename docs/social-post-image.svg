      <circle cx="923" cy="301.7" r="185" fill="none" stroke="#F2C24C" stroke-width="1" opacity="0.16"></circle><circle cx="923" cy="301.7" r="128" fill="none" stroke="#F2C24C" stroke-width="1" opacity="0.13"></circle><circle cx="923" cy="301.7" r="72" fill="none" stroke="#F2C24C" stroke-width="1" opacity="0.1"></circle>
