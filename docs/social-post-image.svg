C" opacity="0.55"></circle><circle cx="798.9" cy="368.9" r="3.2" fill="#F2C24C" opacity="0.55"></circle><circle cx="827.0" cy="431.2" r="3.2" fill="#F2C24C" opacity="0.55"></circle><circle cx="856.1" cy="307.5" r="4.5" fill="#FFD86B" opacity="0.92"></circle><circle cx="881.4" cy="310.6" r="3.2" fill="#F2C24C" opacity="0.55"></circle><circle cx="857.2" cy="299.9" r="3.2" fill="#F2C24C" opacity="0.55"></circle><circle cx="850.4" cy="285.6" r="3.2" fill="#F2C24C" opacity="0.55"></circle><circle cx="819.0" cy="275.6" r="4.5" fill="#FFD86B" opacity="0.92"></circle><circle cx="913.1" cy="283.4" r="3.2" fill="#F2C24C" opacity="0.55"></circle><circle cx="914.6" cy="295.3" r="3.2" fill="#F2C24C" opacity="0.55"></circle><circle cx="879.2" cy="337.2" r="3.2" fill="#F2C24C" opacity="0.55"></circle><circle cx="872.9" cy="367.7" r="4.5" fill="#FFD86B" opacity="0.92"></circle></g>
