<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
  
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop stop-color="#1C1552"></stop>
      <stop offset="1" stop-color="#120C36"></stop>
    </linearGradient>
    <radialGradient id="glow" cx="76%" cy="34%" r="60%">
      <stop stop-color="#FF9466" stop-opacity="0.30"></stop>
      <stop offset="42%" stop-color="#FF9466" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#120C36" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#9FB0E0" stroke-opacity="0.06"></path>
    </pattern>
    <filter id="pinGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.2" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="numGlow" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="14"></feGaussianBlur>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"></feDropShadow>
    </filter>
    <clipPath id="panelClip"><rect x="648" y="84" width="480" height="446" rx="30"></rect></clipPath>
  </defs>

  
  <g id="background">
    <rect width="1200" height="630" fill="url(#bg)"></rect>
    <rect width="1200" height="630" fill="url(#glow)"></rect>
    <rect width="1200" height="630" fill="url(#grid)"></rect>
  </g>

  
  <g id="map">
    <g filter="url(#soft)"><rect x="648" y="84" width="480" height="446" rx="30" fill="#0B1330" fill-opacity="0.55" stroke="#FF9466" stroke-opacity="0.28"></rect></g>
    <g clip-path="url(#panelClip)">
      <rect x="648" y="84" width="480" height="446" fill="url(#grid)"></rect>
      <circle cx="923" cy="301.7" r="185" fill="none" stroke="#FF9466" stroke-width="1" opacity="0.16"></circle><circle cx="923" cy="301.7" r="128" fill="none" stroke="#FF9466" stroke-width="1" opacity="0.13"></circle><circle cx="923" cy="301.7" r="72" fill="none" stroke="#FF9466" stroke-width="1" opacity="0.1"></circle>
      <g id="map-dots"><circle cx="867.7" cy="333.1" r="4.5" fill="#FFB088" opacity="0.92"></circle><circle cx="889.9" cy="353.1" r="3.2" fill="#FF9466" opacity="0.55"></circle><circle cx="878.2" cy="293.6" r="3.2" fill="#FF9466" opacity="0.55"></circle><circle cx="887.6" cy="350.1" r="3.2" fill="#FF9466" opacity="0.55"></circle><circle cx="872.4" cy="330.7" r="4.5" fill="#FFB088" opacity="0.92"></circle><circle cx="866.3" cy="333.9" r="3.2" fill="#FF9466" opacity="0.55"></circle><circle cx="911.5" cy="274.9" r="3.2" fill="#FF9466" opacity="0.55"></circle><circle cx="871.5" cy="346.5" r="3.2" fill="#FF9466" opacity="0.55"></circle><circle cx="864.5" cy="336.9" r="4.5" fill="#FFB088" opacity="0.92"></circle></g>
      <g id="map-route"></g>
    </g>
    
    <g id="map-caption-pill">
      <rect x="668" y="476" width="332" height="40" rx="20" fill="#0B1330" fill-opacity="0.7" stroke="#FF9466" stroke-opacity="0.4"></rect>
      <circle cx="690" cy="496" r="4.5" fill="#FFB088"></circle>
      <text id="map-caption" class="jp" x="704" y="503" font-size="18" font-weight="700" fill="#C9D4F2">鹿児島県指宿市マップ</text>
    </g>
    <g id="stamp" transform="translate(936 132) rotate(-12)">
      <circle cx="0" cy="0" r="56" fill="#120C36" fill-opacity="0.5" stroke="#FFB088" stroke-width="3.5" stroke-dasharray="9 7"></circle>
      <text class="mono" x="0" y="-6" text-anchor="middle" font-size="19" font-weight="900" fill="#FFB088">RARE</text>
      <text class="jp" x="0" y="24" text-anchor="middle" font-size="22" font-weight="900" fill="#FFFFFF">発見</text>
    </g>
  </g>

  
  <g id="content">
    
    <g id="category">
      <rect x="76" y="84" width="96" height="44" rx="22" fill="#FF9466" fill-opacity="0.14" stroke="#FF9466" stroke-opacity="0.7"></rect>
      <circle cx="100" cy="106" r="5" fill="#FFB088" filter="url(#pinGlow)"></circle>
      <text id="cat-label" class="mono" x="114" y="113" font-size="17" font-weight="900" letter-spacing="0.12em" fill="#FFB088">RARE</text>
    </g>

    
    <text id="title-1" class="jp" x="76" y="208" font-size="56" font-weight="900" fill="#FFFFFF" letter-spacing="-0.01em">ポケふた第1号</text>
    <text id="title-2" class="jp" x="76" y="272" font-size="56" font-weight="900" fill="#FFFFFF" letter-spacing="-0.01em">2018年12月設置</text>

    <rect x="76" y="296" width="360" height="2" rx="1" fill="#FF9466" opacity="0.7"></rect>

    
    <text id="num-kicker" class="jp" x="76" y="338" font-size="24" font-weight="800" fill="#FFD86B">鹿児島県指宿市 指宿駅前</text>
    <text id="main-number-glow" class="en" x="74" y="446" font-size="118" font-weight="900" fill="#FFB088" letter-spacing="-0.05em" filter="url(#numGlow)" opacity="0.55">2018</text>
    <text id="main-number" class="en" x="74" y="446" font-size="118" font-weight="900" fill="#FFB088" letter-spacing="-0.05em">2018</text>
    <text id="main-unit" class="jp" x="368" y="436" font-size="42" font-weight="900" fill="#FFFFFF">年</text>

    
    <text id="description" class="jp" x="76" y="490" font-size="22" font-weight="700" fill="#B3A9D6">いーぶいすき＝指宿（いぶすき）の語呂合わせ</text>

    
    <g id="chips"><g><rect id="chip-bg-1" x="76" y="504" width="126" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF9466" stroke-opacity="0.5"></rect><circle cx="90" cy="523" r="3.2" fill="#FF9466"></circle><text id="chip-1" class="jp" x="101" y="530" font-size="21" font-weight="700" fill="#EAF0FF">イーブイ</text></g><g><rect id="chip-bg-2" x="213" y="504" width="105" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF9466" stroke-opacity="0.5"></rect><circle cx="227" cy="523" r="3.2" fill="#FF9466"></circle><text id="chip-2" class="jp" x="238" y="530" font-size="21" font-weight="700" fill="#EAF0FF">指宿市</text></g><g><rect id="chip-bg-3" x="329" y="504" width="126" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF9466" stroke-opacity="0.5"></rect><circle cx="343" cy="523" r="3.2" fill="#FF9466"></circle><text id="chip-3" class="jp" x="354" y="530" font-size="21" font-weight="700" fill="#EAF0FF">指宿駅前</text></g><g><rect id="chip-bg-4" x="466" y="504" width="252" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF9466" stroke-opacity="0.5"></rect><circle cx="480" cy="523" r="3.2" fill="#FF9466"></circle><text id="chip-4" class="jp" x="491" y="530" font-size="21" font-weight="700" fill="#EAF0FF">2018.12.20</text></g></g>
  </g>

  
  <g id="footer">
    <rect x="0" y="546" width="1200" height="84" fill="#0A1026"></rect>
    <rect x="0" y="546" width="1200" height="2.5" fill="#FF9466" opacity="0.85"></rect>
    
    <g id="brand-mark" transform="translate(58 588)">
      <circle r="22" fill="none" stroke="#FF9466" stroke-width="2.4"></circle>
      <circle r="15" fill="none" stroke="#FFB088" stroke-width="1.6" stroke-opacity="0.8"></circle>
      <circle r="4.5" fill="#FFB088"></circle>
      <g stroke="#FF9466" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-22" x2="0" y2="-16"></line><line x1="0" y1="16" x2="0" y2="22"></line>
        <line x1="-22" y1="0" x2="-16" y2="0"></line><line x1="16" y1="0" x2="22" y2="0"></line>
        <line x1="15.5" y1="15.5" x2="11" y2="11"></line><line x1="-15.5" y1="15.5" x2="-11" y2="11"></line>
        <line x1="15.5" y1="-15.5" x2="11" y2="-11"></line><line x1="-15.5" y1="-15.5" x2="-11" y2="-11"></line>
      </g>
    </g>
    <text id="footer-name" class="jp" x="94" y="582" font-size="26" font-weight="900" fill="#FFFFFF">ポケふたマップ</text>
    <text id="footer-sub" class="jp" x="94" y="608" font-size="15" font-weight="700" fill="#9FAAD2">日本全国のご当地マンホール雑学</text>
    <text id="footer-url" class="mono" x="1142" y="582" text-anchor="end" font-size="20" font-weight="900" fill="#FFB088">data.pokefuta.com</text>
    <text id="footer-note" class="jp" x="1142" y="608" text-anchor="end" font-size="15" font-weight="700" fill="#9FAAD2">全国470枚以上を地図で掲載</text>
    <g transform="translate(1142 552)">
      <circle cx="-36" cy="0" r="0"></circle>
    </g>
  </g>
</svg>